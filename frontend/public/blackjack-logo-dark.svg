<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Poker chip outline -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#111" stroke-width="3" stroke-dasharray="6 3" />
  <circle cx="50" cy="50" r="38" fill="none" stroke="#111" stroke-width="1.5" />
  <!-- Cards -->
  <g transform="translate(15, 15) scale(0.7)">
    <!-- Card 1 (Jack) - tilted -->
    <g transform="rotate(-15, 30, 45)">
      <rect x="5" y="5" width="50" height="75" rx="5" fill="#111" stroke="#111" stroke-width="2" />
      <text x="12" y="25" fill="#fff" font-family="serif" font-weight="bold" font-size="16">J</text>
      <!-- Spade icon path -->
      <path d="M 30,42 C 28.5,44 27,45.5 28.5,47 C 29.5,48 30.5,47 30,48.5 C 29.5,49.5 30.5,50.5 32.5,50.5 C 32,48.5 32.5,48 34,47 C 35.5,45.5 34,44 32.5,42 Z" fill="#fff" transform="translate(3, 3)" />
    </g>
    <!-- Card 2 (Ace) - upright -->
    <g transform="translate(20, 5) rotate(10, 30, 45)">
      <rect x="5" y="5" width="50" height="75" rx="5" fill="#fff" stroke="#111" stroke-width="2" />
      <text x="12" y="25" fill="#111" font-family="serif" font-weight="bold" font-size="16">A</text>
      <!-- Spade icon path -->
      <path d="M 30,42 C 28.5,44 27,45.5 28.5,47 C 29.5,48 30.5,47 30,48.5 C 29.5,49.5 30.5,50.5 32.5,50.5 C 32,48.5 32.5,48 34,47 C 35.5,45.5 34,44 32.5,42 Z" fill="#111" transform="translate(3, 3)" />
    </g>
  </g>
</svg>
