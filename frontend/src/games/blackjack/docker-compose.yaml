services:
  postgres:
    image: postgres:16-alpine
    container_name: poc-blackjack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: poc
      POSTGRES_DB: poc
    ports:
      - "5432:5432"
    volumes:
      - poc-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc -d poc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  poc-db-data:
