name: Deploy Backend

on:
  push:
    branches: [dev]
    paths: ["backend/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, production]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build and push backend image
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build and push Docker image
        env:
          ECR_URL: ${{ vars.ECR_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd backend
          aws ecr get-login-password | docker login --username AWS --password-stdin "${ECR_URL}"
          docker build -t "${ECR_URL}:${IMAGE_TAG}" .
          docker push "${ECR_URL}:${IMAGE_TAG}"

  update-pulumi:
    name: Update Pulumi backend image tag
    needs: build-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: infra/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run Pulumi up
        uses: pulumi/actions@cd99a7f8865434dd3532b586a26f9ebea596894f # v5.5.1
        with:
          command: up
          stack-name: ${{ github.event.inputs.environment || 'dev' }}
          work-dir: infra
          pulumi-version: 3.243.0
          config-map: |
            dopamint:backend-image-tag:
              value: ${{ github.sha }}

  migrate:
    name: Run database migrations
    needs: update-pulumi
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Snapshot DB
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SNAPSHOT_ID="pre-migration-${SHA}-$(date +%s)"
          echo "SNAPSHOT_ID=$SNAPSHOT_ID" >> "$GITHUB_ENV"
          aws rds create-db-cluster-snapshot \
            --db-cluster-identifier "dopamint-${ENVIRONMENT}-aurora" \
            --db-cluster-snapshot-identifier "$SNAPSHOT_ID"
          aws rds wait db-cluster-snapshot-available \
            --db-cluster-snapshot-identifier "$SNAPSHOT_ID"

      - name: Run migration
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_MIGRATION_TASK_DEF: ${{ vars.ECS_MIGRATION_TASK_DEF }}
          PRIVATE_SUBNET_IDS: ${{ vars.PRIVATE_SUBNET_IDS }}
          BACKEND_SECURITY_GROUP_ID: ${{ vars.BACKEND_SECURITY_GROUP_ID }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          LATEST_MIGRATION_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${ECS_MIGRATION_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          TASK_ARN=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --task-definition "$LATEST_MIGRATION_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${PRIVATE_SUBNET_IDS}],securityGroups=[${BACKEND_SECURITY_GROUP_ID}],assignPublicIp=DISABLED}" \
            --started-by "github-actions-migrate-${SHA}" \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER}" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "${ECS_CLUSTER}" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then exit 1; fi

      - name: Migration completed
        run: echo "Migration completed successfully"

  deploy-service:
    name: Deploy backend ECS service
    needs: migrate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update service to latest backend task definition
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          ECS_BACKEND_TASK_DEF: ${{ vars.ECS_BACKEND_TASK_DEF }}
        run: |
          set -euo pipefail
          LATEST_BACKEND_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${ECS_BACKEND_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "$LATEST_BACKEND_TASK_DEF" \
            --force-new-deployment

      - name: Wait for service stability
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: aws ecs wait services-stable --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}"

      - name: Smoke test
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          set -euo pipefail
          curl -fsS "${BACKEND_URL}/health/live"
          curl -fsS "${BACKEND_URL}/health/ready"
