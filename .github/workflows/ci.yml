name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      ts_sdk: ${{ steps.filter.outputs.ts_sdk }}
      move: ${{ steps.filter.outputs.move }}
      rust_backend: ${{ steps.filter.outputs.rust_backend }}
      rust_tunnel: ${{ steps.filter.outputs.rust_tunnel }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/ci.yml'
            ts_sdk:
              - 'sui-tunnel-ts/**'
            move:
              - 'sui_tunnel/**'
              - 'contracts/mtps/**'
            rust_backend:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - 'rustfmt.toml'
              - 'backend/**'
              - 'rust/**'
            rust_tunnel:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - 'rustfmt.toml'
              - 'rust/**'
            frontend:
              - '.nvmrc'
              - '.prettierrc'
              - '.prettierignore'
              - 'frontend/**'
              - 'sui-tunnel-ts/**'

  ts-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.ts_sdk == 'true'
    defaults:
      run:
        working-directory: sui-tunnel-ts
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          # The committed `test` script uses the stable `--test-isolation`
          # flag, which graduated from experimental in Node 24.
          node-version: 24
          cache: pnpm
          cache-dependency-path: sui-tunnel-ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  move:
    name: Move contracts
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.move == 'true'
    # Bump to an existing release tag if the download 404s.
    env:
      SUI_VERSION: testnet-v1.73.1
    steps:
      - uses: actions/checkout@v4
      - name: Install Sui CLI
        run: |
          set -euo pipefail
          url="https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz"
          curl -fsSL "$url" -o sui.tgz
          mkdir -p sui-bin && tar -xzf sui.tgz -C sui-bin
          sudo mv "$(find sui-bin -type f -name sui | head -1)" /usr/local/bin/sui
          sui --version
      - name: Build & test
        run: |
          cd sui_tunnel
          sui move build --build-env testnet
          sui move test --build-env testnet
          cd ../contracts/mtps
          sui move build --build-env testnet
          sui move test --build-env testnet

  # The backend workspace used to compile three times in one serial job
  # (clippy → build → test, ~21 min). Split into parallel jobs so the critical
  # path is the test step alone; each job gets its own per-job rust-cache.
  rust-backend-lint:
    name: Rust backend / fmt + clippy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.rust_backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  rust-backend-build:
    name: Rust backend / build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.rust_backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked

  rust-backend-test:
    name: Rust backend / test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.rust_backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # fleet-bench's swarm sims (~5.8 min of run time) live in their own lane
      # (rust-fleet-bench) so they neither sit on this critical path nor
      # double-run with rust-tunnel.
      - run: cargo test --locked --workspace --exclude fleet-bench

  # Full-scale fleet-bench swarm/lifecycle sims. Kept per-PR at full scale — they
  # guard drain/settle-race and telemetry/byte invariants — but isolated to one
  # parallel lane instead of running inside both rust-backend and rust-tunnel.
  rust-fleet-bench:
    name: Rust fleet-bench sims
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.rust_backend == 'true' || needs.changes.outputs.rust_tunnel == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p fleet-bench

  rust-tunnel:
    name: Rust tunnel crates
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.rust_tunnel == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Scoped to the tunnel engine/protocols/fleet crates so they are gated
      # independently of the libpq/sui backend toolchain (faster, and green even if
      # that build breaks). fleet-bench is gated separately in rust-fleet-bench.
      - run: cargo fmt --check -p tunnel-core -p tunnel-harness -p tunnel-blackjack -p tunnel-payments -p fleet-serve
      - run: cargo clippy --locked --all-targets -p tunnel-core -p tunnel-harness -p tunnel-blackjack -p tunnel-payments -p fleet-serve -- -D warnings
      - run: cargo build --locked -p tunnel-core -p tunnel-harness -p tunnel-blackjack -p tunnel-payments -p fleet-serve
      - run: cargo test --locked -p tunnel-core -p tunnel-harness -p tunnel-blackjack -p tunnel-payments -p fleet-serve

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          # node-version-file resolves against the repo root (not working-directory),
          # so this reads the same .nvmrc the deploy workflow uses.
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            sui-tunnel-ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # tsconfig/vite alias `sui-tunnel-ts` to ../sui-tunnel-ts/src, so the SDK's
      # own deps must be installed for typecheck and build to resolve.
      - name: Install SDK dependencies
        working-directory: sui-tunnel-ts
        run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm test
