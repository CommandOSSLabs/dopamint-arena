name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sui-tunnel-ts
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          # The committed `test` script uses the stable `--test-isolation`
          # flag, which graduated from experimental in Node 24.
          node-version: 24
          cache: pnpm
          cache-dependency-path: sui-tunnel-ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  move:
    name: Move contracts
    runs-on: ubuntu-latest
    # Use the same pinned sui-tools image as test.yml's move-tests. The previous
    # downloaded CLI (testnet-v1.39.3) was too old to resolve the implicit Sui
    # framework for edition-2024 sources, so every `sui::*` use was unbound.
    container:
      image: mysten/sui-tools:mainnet-v1.72.5@sha256:a8fd60e532c586bdfded5159bc9338f89feb789bbfe39e2ebdc713f56567cf05
    defaults:
      run:
        working-directory: sui_tunnel
    steps:
      - uses: actions/checkout@v4
      - name: Build & test
        run: |
          sui move build
          sui move test

  rust-backend:
    name: Rust backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --locked
      - run: cargo test --locked

  backend-valkey-it:
    name: Backend Valkey integration tests
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
      - name: Run ignored Valkey integration tests
        env:
          TEST_REDIS_URL: redis://localhost:6379
        run: cargo test -p tunnel-manager -- --ignored
