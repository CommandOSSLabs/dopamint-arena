name: Benchmark

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "staging"
        type: choice
        options: [dev, staging, production]

concurrency:
  group: benchmark-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      # The IAM role's MaxSessionDuration must be at least role-duration-seconds (9000).
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 9000

      - name: Scale benchmark fleet
        env:
          BENCHMARK_ASG_NAME: ${{ vars.BENCHMARK_ASG_NAME }}
        run: |
          set -euo pipefail
          aws autoscaling set-desired-capacity \
            --auto-scaling-group-name "$BENCHMARK_ASG_NAME" \
            --desired-capacity 1

      - name: Wait for benchmark instance
        env:
          BENCHMARK_ASG_NAME: ${{ vars.BENCHMARK_ASG_NAME }}
        run: |
          set -euo pipefail
          echo "Waiting for one InService benchmark instance..."
          for i in $(seq 1 60); do
            COUNT=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$BENCHMARK_ASG_NAME" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId | length(@)" \
              --output text || echo 0)
            if [ -z "$COUNT" ] || [ "$COUNT" = "None" ]; then COUNT=0; fi
            echo "InService count: $COUNT"
            if [ "$COUNT" -ge 1 ]; then
              echo "Benchmark instance is ready"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for benchmark instance" >&2
          exit 1

      - name: Run benchmark and capture TPS
        id: bench
        env:
          BENCHMARK_ASG_NAME: ${{ vars.BENCHMARK_ASG_NAME }}
          BENCHMARK_COMMAND: "cd /opt/dopamint/repo/sui-tunnel-ts && numactl --interleave=all UV_THREADPOOL_SIZE=128 node --import tsx src/bench/cli.ts --tunnels 20000 --updates-per-tunnel 50 --agents 2000 --workers 95"
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$BENCHMARK_ASG_NAME" \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].[InstanceId,LaunchTime]' \
            --output text | sort -k2 | tail -1 | cut -f1)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No InService benchmark instance found" >&2
            exit 1
          fi
          echo "Using benchmark instance: $INSTANCE_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' --output text)
            echo "SSM PingStatus: $STATUS"
            if [ "$STATUS" = "Online" ]; then
              break
            fi
            sleep 5
          done
          if [ "$STATUS" != "Online" ]; then
            echo "SSM agent did not become Online" >&2
            exit 1
          fi

          PARAMS=$(jq -n --arg cmd "$BENCHMARK_COMMAND" '{commands:[$cmd]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Benchmark run via GitHub Actions: run ${{ github.run_id }}, repo ${{ github.repository }}" \
            --parameters "$PARAMS" \
            --timeout-seconds 3600 \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --output text --query 'Command.CommandId')
          echo "SSM command ID: $COMMAND_ID"

          fetch_cloudwatch_logs() {
            local stream_suffix="$1"
            local output_file="$2"
            local stream_name="${COMMAND_ID}/${INSTANCE_ID}/awsrunShellScript/${stream_suffix}"
            : > "$output_file"
            local next_token=""
            local response_file
            response_file=$(mktemp)
            trap 'rm -f "$response_file"' EXIT
            for attempt in $(seq 1 60); do
              if aws logs get-log-events \
                --log-group-name /aws/ssm/AWS-RunShellScript \
                --log-stream-name "$stream_name" \
                --start-from-head \
                --limit 10000 \
                ${next_token:+--next-token "$next_token"} \
                --output json > "$response_file" 2>/tmp/cw-err.txt; then
                jq -r '.events[].message' "$response_file" >> "$output_file"
                local new_token
                new_token=$(jq -r '.nextForwardToken' "$response_file")
                if [ "$new_token" = "$next_token" ] || [ -z "$new_token" ] || [ "$new_token" = "null" ]; then
                  rm -f /tmp/cw-err.txt
                  return 0
                fi
                next_token="$new_token"
                sleep 1
              else
                echo "CloudWatch stream not ready yet (attempt $attempt), retrying..."
                sleep 5
              fi
            done
            cat /tmp/cw-err.txt >&2
            rm -f /tmp/cw-err.txt
            return 1
          }

          for i in $(seq 1 390); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text)
            echo "SSM command status: $STATUS"
            case "$STATUS" in
              Success)
                fetch_cloudwatch_logs stdout benchmark-output.txt

                SUSTAINED_TPS=$(grep -oP 'sustained tps: \K[0-9,]+' benchmark-output.txt | tr -d ',' || echo "")
                PEAK_TPS=$(grep -oP 'peak tps: \K[0-9,]+' benchmark-output.txt | tr -d ',' || echo "")
                if ! [[ "$SUSTAINED_TPS" =~ ^[0-9]+$ ]] || [ "$SUSTAINED_TPS" -eq 0 ]; then
                  echo "Could not parse sustained TPS from benchmark output" >&2
                  cat benchmark-output.txt >&2
                  exit 1
                fi
                echo "sustained_tps=$SUSTAINED_TPS" >> "$GITHUB_OUTPUT"
                echo "peak_tps=${PEAK_TPS:-0}" >> "$GITHUB_OUTPUT"
                cat benchmark-output.txt
                exit 0
                ;;
              Failed|Delivery\ Timed\ Out|Execution\ Timed\ Out|Cancelled|Undeliverable|Terminated)
                echo "SSM command failed with status: $STATUS" >&2
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' --output text >&2 || true
                fetch_cloudwatch_logs stdout /tmp/benchmark-stdout.txt || true
                fetch_cloudwatch_logs stderr /tmp/benchmark-stderr.txt || true
                cat /tmp/benchmark-stdout.txt >&2 || true
                cat /tmp/benchmark-stderr.txt >&2 || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command to complete" >&2
          exit 1

      - name: Assert minimum sustained TPS
        env:
          SUSTAINED_TPS: ${{ steps.bench.outputs.sustained_tps }}
          MIN_SUSTAINED_TPS: ${{ vars.BENCHMARK_MIN_SUSTAINED_TPS || '1000000' }}
        run: |
          set -euo pipefail
          if ! [[ "$MIN_SUSTAINED_TPS" =~ ^[0-9]+$ ]]; then
            echo "BENCHMARK_MIN_SUSTAINED_TPS must be a non-negative integer" >&2
            exit 1
          fi
          if [ "$SUSTAINED_TPS" -lt "$MIN_SUSTAINED_TPS" ]; then
            echo "Sustained TPS $SUSTAINED_TPS is below minimum $MIN_SUSTAINED_TPS"
            exit 1
          fi

      - name: Upload benchmark output artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-output
          path: benchmark-output.txt
          if-no-files-found: ignore

      - name: Upload benchmark stdout/stderr artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-logs
          path: |
            /tmp/benchmark-stdout.txt
            /tmp/benchmark-stderr.txt
          if-no-files-found: ignore

  cleanup:
    name: Scale down benchmark fleet
    needs: benchmark
    if: always() && needs.benchmark.result != 'skipped'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 1800
      - name: Scale down benchmark fleet
        env:
          BENCHMARK_ASG_NAME: ${{ vars.BENCHMARK_ASG_NAME }}
        run: |
          set -euo pipefail
          echo "Scaling down benchmark fleet..."
          aws autoscaling set-desired-capacity \
            --auto-scaling-group-name "$BENCHMARK_ASG_NAME" \
            --desired-capacity 0
          for i in $(seq 1 60); do
            COUNT=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$BENCHMARK_ASG_NAME" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId | length(@)" \
              --output text || echo 0)
            if [ -z "$COUNT" ] || [ "$COUNT" = "None" ]; then COUNT=0; fi
            echo "InService count: $COUNT"
            if [ "$COUNT" -eq 0 ]; then
              echo "Benchmark fleet scaled down"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for benchmark fleet to scale down" >&2
          exit 1
