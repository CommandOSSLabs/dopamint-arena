name: Deploy Infra

on:
  push:
    branches: [dev]
    paths: ["infra/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, production]
      backendImageTag:
        description: "Backend image tag"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

# Shared group with deploy-backend: both run `pulumi up` on the same stack, so they must
# serialize or they collide with a 409 ConcurrentUpdate (Pulumi's per-stack lock).
concurrency:
  group: pulumi-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy-infra:
    name: Deploy infrastructure
    permissions:
      id-token: write
      contents: read
      actions: write
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: infra/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy infrastructure with Pulumi
        uses: pulumi/actions@cd99a7f8865434dd3532b586a26f9ebea596894f # v5.5.1
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          command: up
          stack-name: CommandOSS/dopamint-arena/${{ github.event.inputs.environment || 'dev' }}
          work-dir: infra
          pulumi-version: 3.243.0
          config-map: |
            dopamint:backend-image-tag:
              value: ${{ github.event.inputs.backendImageTag || 'latest' }}
