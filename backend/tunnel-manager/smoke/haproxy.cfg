global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client 1m
    timeout server 1m
    # WebSocket connections are long-lived once upgraded.
    timeout tunnel 1h

frontend mp_front
    bind *:8080
    default_backend relays

backend relays
    balance roundrobin
    option httpchk GET /healthz
    # Resolve the relay service names at runtime via compose DNS; don't fail to boot if
    # they aren't resolvable yet (also lets `haproxy -c` lint this file standalone).
    default-server init-addr last,libc,none
    # Application-cookie affinity: read the `aff` cookie the relay sets on the /v1/mp
    # handshake and pin the request to the server whose cookie value matches. No `insert`
    # — the relay owns the cookie; haproxy only honors it. This is the "honoring the aff
    # cookie" path from the deployment note; AWS ALB would use its own stickiness cookie.
    cookie aff
    server relay_a relay-a:8080 check cookie inst-a
    server relay_b relay-b:8080 check cookie inst-b
