services:
  sui-localnet:
    # sui-tools ships SEPARATE per-arch tags (no unified multi-arch manifest): the bare
    # `testnet-v1.74.0` is linux/amd64 and SIGILLs ("Illegal instruction") under QEMU on
    # arm64. stack.ts sets SUI_TOOLS_TAG from the host arch (…-arm64 on Apple Silicon, the
    # amd64 default below on x86_64 / CI), so the container runs natively on both. If Docker
    # is unusable, stack.ts still detects the unhealthy container and falls back to host `sui`.
    #
    # sui ≥ 1.74 requires `sui genesis -f --with-faucet` before `sui start`
    # when starting fresh — `--force-regenesis` alone does not seed a funded wallet.
    image: mysten/sui-tools:${SUI_TOOLS_TAG:-testnet-v1.74.0}
    command:
      - /bin/sh
      - -c
      - "sui genesis -f --with-faucet && sui start --with-faucet"
    ports: ["${SUI_RPC_PORT:-9000}:9000", "${SUI_FAUCET_PORT:-9123}:9123"]
    environment:
      SUI_PROTOCOL_CONFIG_OVERRIDE_ENABLE: "1"
      # sui_tunnel bytecode is ~139 KB (> the 102 KB localnet default).
      SUI_PROTOCOL_CONFIG_OVERRIDE_max_move_package_size: "512000"
      # The SDK publish tx carries the whole package (~180 KB > the 128 KiB default).
      SUI_PROTOCOL_CONFIG_OVERRIDE_max_tx_size_bytes: "2097152"
    healthcheck:
      # curl is not in the image; probe the RPC TCP port via bash.
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/9000"]
      interval: 5s
      timeout: 5s
      retries: 80

  valkey:
    image: valkey/valkey:8-alpine
    ports: ["${VALKEY_PORT:-6379}:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  loadbench:
    profiles: ["bench"]
    build:
      context: ../..
      dockerfile: tools/loadbench/Dockerfile
    environment:
      SUI_RPC_URL: "http://sui-localnet:9000"
    volumes:
      - ./.env.local:/app/tools/loadbench/.env.local:ro
      - ./keys.json:/app/tools/loadbench/keys.json:ro
      # read-write so an all-games `--container` run lands its report on the host
      - ./reports:/app/tools/loadbench/reports
    networks:
      default: {}
    deploy:
      resources:
        limits:
          # Overridden per run by the host cli via `--cpus` / `--memory`
          # (exported as BENCH_CPUS / BENCH_MEMORY before `docker compose run`).
          cpus: "${BENCH_CPUS:-4}"
          memory: "${BENCH_MEMORY:-4g}"
    # Default when run with no args: offchain burst. The host `bench --container …`
    # path passes explicit inner args. --channel relay is unsupported in-container.
    command: ["--channel", "local", "--tunnel-anchor", "offchain", "--workers", "auto", "--duration", "10"]
